[build]
  base = "backend"
  publish = "../frontend/public"
  command = "npm install"
  functions = "functions"

[functions]
  node_bundler = "nft"
  included_files = ["formulas/templates/*.xlsx", "formulas/templates/*.xls"]


[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
